<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>نظرات ماهان‌لند</title>
<style>
body{
    font-family:sans-serif;
    direction: rtl;
    background:#f0f2f5;
    color:#222;
    padding:20px;
    margin:0;
}
h1{
    text-align:center;
    color:#6a00f4;
    margin-bottom:30px;
}

/* فرم نظر */
#review-form{
    margin-bottom:30px;
    background:white;
    padding:20px;
    border-radius:12px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
    max-width:600px;
    margin-left:auto;
    margin-right:auto;
}
#review-form textarea{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
    resize:none;
    font-size:14px;
    margin-top:10px;
    box-sizing:border-box;
}
#review-form button{
    margin-top:10px;
    padding:10px 18px;
    border-radius:8px;
    border:none;
    cursor:pointer;
    background:linear-gradient(90deg,#1500ff,#ad41ff);
    color:white;
    font-weight:bold;
    transition:0.3s;
}
#review-form button:hover{
    background:linear-gradient(90deg,#ad41ff,#1500ff);
}

/* ستاره‌ها */
.stars span{
    font-size:28px;
    cursor:pointer;
    color:#ccc;
    margin-left:5px;
    transition:color 0.2s;
}
.stars span.hover,
.stars span.selected{
    color:gold;
}

/* میانگین ستاره‌ها */
#average-rating{
    font-weight:bold;
    font-size:18px;
    margin-bottom:20px;
    color:#1500ff;
    text-align:center;
}

/* لیست نظرات */
#reviews-list{
    list-style:none;
    padding:0;
    max-width:600px;
    margin-left:auto;
    margin-right:auto;
}
.review-item{
    background:linear-gradient(135deg,#e0f7fa,#ffffff);
    border-radius:12px;
    padding:15px;
    margin-bottom:15px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
    position:relative;
    transition:opacity 0.5s ease, transform 0.5s ease;
    word-wrap: break-word;
}
.review-item:hover{
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
}
.review-stars{
    color:gold;
    font-size:20px;
    margin-bottom:5px;
}
.review-text{
    font-size:14px;
    color:#333;
}

/* دکمه حذف */
.delete-btn{
    position:absolute;
    top:10px;
    left:10px;
    background:#ff4d4d;
    border:none;
    border-radius:6px;
    padding:4px 8px;
    cursor:pointer;
    color:white;
    font-size:12px;
    transition:0.3s;
}
.delete-btn:hover{
    background:yellow;
    color:black;
}

/* واکنش‌گرایی */
@media screen and (max-width: 640px){
    body{
        padding:10px;
    }
    #review-form, #reviews-list{
        width:100%;
        padding:15px;
    }
    .stars span{
        font-size:24px;
        margin-left:3px;
    }
    .review-stars{
        font-size:18px;
    }
    #review-form button{
        width:100%;
    }
}
</style>
</head>
<body>

<h1>ثبت نظر در ماهان‌لند</h1>

<div id="review-form">
    <label>ستاره‌ها: </label>
    <span class="stars">
        <span data-value="1">&#9733;</span>
        <span data-value="2">&#9733;</span>
        <span data-value="3">&#9733;</span>
        <span data-value="4">&#9733;</span>
        <span data-value="5">&#9733;</span>
    </span>
    <textarea id="review-input" rows="3" placeholder="نظر خود را بنویسید..."></textarea>
    <button id="submit-review">ثبت نظر</button>
</div>

<div id="average-rating">میانگین امتیاز: 0</div>
<ul id="reviews-list"></ul>

<script>
// بارگذاری نظرات
let reviews = JSON.parse(localStorage.getItem('reviews')||'[]');
const reviewsList = document.getElementById('reviews-list');
const averageRatingEl = document.getElementById('average-rating');
const stars = document.querySelectorAll('.stars span');
let selectedRating = 0;

// بروزرسانی رنگ ستاره‌ها
function updateStarsDisplay(rating){
    stars.forEach(star=>{
        const val = parseInt(star.dataset.value);
        star.classList.toggle('selected', val <= rating);
    });
}

// هاور ستاره‌ها
stars.forEach(star=>{
    star.addEventListener('mouseover', ()=>{
        const val = parseInt(star.dataset.value);
        stars.forEach(s=>{
            const v = parseInt(s.dataset.value);
            s.classList.toggle('hover', v <= val);
        });
    });
    star.addEventListener('mouseleave', ()=>{
        stars.forEach(s=> s.classList.remove('hover'));
    });
    star.addEventListener('click', ()=>{
        selectedRating = parseInt(star.dataset.value);
        updateStarsDisplay(selectedRating);
    });
});

// ثبت نظر
document.getElementById('submit-review').addEventListener('click', ()=>{
    const text = document.getElementById('review-input').value.trim();
    if(selectedRating===0){alert('لطفاً ستاره‌ای انتخاب کنید'); return;}
    if(text===''){alert('لطفاً نظر خود را بنویسید'); return;}

    reviews.push({rating:selectedRating, text:text});
    localStorage.setItem('reviews', JSON.stringify(reviews));
    document.getElementById('review-input').value='';
    selectedRating=0;
    updateStarsDisplay(0);
    renderReviews();
});

// حذف نظر با انیمیشن
function deleteReview(index){
    const li = reviewsList.children[index];
    li.style.opacity = 0;
    li.style.transform = 'translateX(100%)';
    setTimeout(()=>{
        reviews.splice(index,1);
        localStorage.setItem('reviews', JSON.stringify(reviews));
        renderReviews();
    },500);
}

// نمایش نظرات و میانگین
function renderReviews(){
    reviewsList.innerHTML='';
    let total=0;
    reviews.forEach((r,i)=>{
        total += r.rating;
        const li = document.createElement('li');
        li.className='review-item';
        li.innerHTML = `
            <button class="delete-btn" onclick="deleteReview(${i})">حذف</button>
            <div class="review-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div>
            <div class="review-text">${r.text}</div>
        `;
        reviewsList.appendChild(li);
    });
    const avg = reviews.length ? (total/reviews.length).toFixed(1) : 0;
    averageRatingEl.textContent = `میانگین امتیاز: ${avg}`;
}

// بارگذاری اولیه
renderReviews();
</script>

</body>
</html>
