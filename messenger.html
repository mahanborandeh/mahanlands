<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فضای ذخیره سازی پیام</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:tahoma,sans-serif;
    direction:rtl;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* کانتینر اصلی */
.container{
    width:90%;
    max-width:500px;
    height:90vh;
    background:white;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.2);
    display:flex;
    flex-direction:column;
    overflow:hidden;
}

/* هدر */
.header{
    background:linear-gradient(90deg,#2196f3,#c77dff);
    color:white;
    padding:12px;
    font-weight:bold;
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:14px;
}

.header button{
    background:gold;
    color:black;
    border:none;
    padding:6px 10px;
    border-radius:8px;
    cursor:pointer;
}

/* چت */
#chat-box{
    flex:1;
    overflow-y:auto;
    padding:12px;
    background:#e8eaf6;
}

/* پیام */
.message{
    max-width:80%;
    margin:8px 0;
    padding:10px 14px;
    border-radius:15px;
    line-height:1.5;
    position:relative;
    word-wrap: break-word;
    background:#2196f3;
    color:white;
    margin-left:auto;

    opacity:0;
    transform:translateY(20px);
    animation:fadeIn 0.3s forwards;
}

@keyframes fadeIn{
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* حذف پیام */
.delete-btn{
    position:absolute;
    top:4px;
    right:6px;
    font-size:12px;
    cursor:pointer;
    color:#ffdddd;
}

/* ورودی پیام */
.input-box{
    display:flex;
    gap:8px;
    border-top:1px solid #ccc;
    padding:10px;
    background:#fff;
}

input{
    flex:1;
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
    outline:none;
    font-size:14px;
}

button.send-btn{
    padding:10px 14px;
    border:none;
    background:#2196f3;
    color:white;
    cursor:pointer;
    border-radius:8px;
    font-size:14px;
}

button.send-btn:hover{
    background:gold;
    color:black;
}

/* ===== موبایل ===== */
@media (max-width:600px){
    .container{
        width:100%;
        height:100vh;
        border-radius:0;
    }

    .header{
        font-size:13px;
    }

    input, .send-btn{
        font-size:13px;
    }

    .message{
        font-size:13px;
        max-width:90%;
    }
}
</style>
</head>

<body>

<div class="container">
    <div class="header">
        <span id="header-text">پیام‌رسان ماهان‌لند</span>
        <button onclick="clearChat()">پاک کردن</button>
    </div>

    <div id="chat-box"></div>

    <div class="input-box">
        <input type="text" id="message-input" placeholder="پیام خود را بنویسید..." maxlength="300">
        <button class="send-btn" onclick="sendMessage()">ارسال</button>
    </div>
</div>

<script>
const username = localStorage.getItem("username") || "کاربر ناشناس";
document.getElementById("header-text").textContent =
    `فضای ذخیره سازی پیام‌های ${username}`;

const storageKey = "chat_" + username;
const chatBox = document.getElementById("chat-box");

let messages = JSON.parse(localStorage.getItem(storageKey) || "[]");
messages.forEach(m => displayMessage(m));

function displayMessage(msg){
    const div = document.createElement("div");
    div.className = "message";
    div.textContent = msg.text;

    const del = document.createElement("span");
    del.className = "delete-btn";
    del.textContent = "×";
    del.onclick = () => deleteMessage(msg.id);

    div.appendChild(del);
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
}

function sendMessage(){
    const input = document.getElementById("message-input");
    const text = input.value.trim();
    if(!text) return;

    const msg = { id: Date.now(), text };
    messages.push(msg);
    localStorage.setItem(storageKey, JSON.stringify(messages));
    displayMessage(msg);
    input.value = "";
}

function deleteMessage(id){
    messages = messages.filter(m => m.id !== id);
    localStorage.setItem(storageKey, JSON.stringify(messages));
    chatBox.innerHTML = "";
    messages.forEach(m => displayMessage(m));
}

function clearChat(){
    if(confirm("همه پیام‌ها پاک شود؟")){
        messages = [];
        localStorage.removeItem(storageKey);
        chatBox.innerHTML = "";
    }
}

/* ارسال با Enter */
document.getElementById("message-input").addEventListener("keypress", e=>{
    if(e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
