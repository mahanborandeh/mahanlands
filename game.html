<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بازی پینگ پنگ واکنش‌گرا</title>
<style>
    html, body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #000;
        height: 100%;
        font-family: Verdana, sans-serif;
    }
    #gameContainer {
        position: relative;
        width: 100%;
        height: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    canvas {
        background: #0a0a0a;
        touch-action: none;
        border: 2px solid #fff;
    }
    #score {
        position: absolute;
        top: 10px;
        color: #fff;
        font-size: 24px;
        text-align: center;
        width: 100%;
    }
    #instructions {
        position: absolute;
        bottom: 40px;
        color: #fff;
        font-size: 16px;
        text-align: center;
        width: 100%;
    }
    #restartBtn {
        position: absolute;
        bottom: 10px;
        left: 50%;
        transform: translateX(-50%);
        padding: 8px 16px;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        background: #39FF14;
        color: #000;
        cursor: pointer;
        display: none;
    }
</style>
</head>
<body>
<div id="gameContainer">
    <canvas id="gameCanvas"></canvas>
    <div id="score"></div>
    <div id="instructions">حرکت بالا: ↑ | حرکت پایین: ↓ | روی موبایل: لمس نیم بالا یا پایین صفحه</div>
    <button id="restartBtn" onclick="restartGame()">شروع دوباره</button>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const restartBtn = document.getElementById('restartBtn');

let GAME_WIDTH = window.innerWidth * 0.95;
let GAME_HEIGHT = window.innerHeight * 0.7;
canvas.width = GAME_WIDTH;
canvas.height = GAME_HEIGHT;

// تنظیمات
const PADDLE_WIDTH = 10;
const PADDLE_HEIGHT = 100;
const BALL_RADIUS = 10;
const WINNING_SCORE = 5;

let player1Score = 0;
let player2Score = 0;
let gameOver = false;

// بازیکن‌ها
const player1 = {x: 20, y: GAME_HEIGHT/2 - PADDLE_HEIGHT/2, width: PADDLE_WIDTH, height: PADDLE_HEIGHT, dy:0, speed:6};
const player2 = {x: GAME_WIDTH - 20 - PADDLE_WIDTH, y: GAME_HEIGHT/2 - PADDLE_HEIGHT/2, width: PADDLE_WIDTH, height: PADDLE_HEIGHT, speed:4.5};

// توپ
const ball = {x: GAME_WIDTH/2, y: GAME_HEIGHT/2, radius: BALL_RADIUS, speed:5, dx:5, dy:5};

// رسم‌ها
function drawPaddle(p) {
    ctx.fillStyle = (p===player1) ? '#39FF14' : '#FF0000';
    ctx.fillRect(p.x, p.y, p.width, p.height);
}
function drawBall() {
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2);
    ctx.fill();
}

// به‌روزرسانی بازیکن‌ها
function updatePlayer1() {
    player1.y += player1.dy;
    if(player1.y<0) player1.y=0;
    if(player1.y+player1.height>GAME_HEIGHT) player1.y = GAME_HEIGHT - player1.height;
}
function updatePlayer2() {
    if(player2.y + player2.height/2 < ball.y) player2.y += player2.speed;
    else player2.y -= player2.speed;
    if(player2.y<0) player2.y=0;
    if(player2.y+player2.height>GAME_HEIGHT) player2.y = GAME_HEIGHT - player2.height;
}

// توپ
function updateBall() {
    ball.x += ball.dx;
    ball.y += ball.dy;

    if(ball.y - ball.radius <0 || ball.y+ball.radius > GAME_HEIGHT) ball.dy = -ball.dy;

    let paddle = null;
    if(ball.x - ball.radius < player1.x + player1.width &&
       ball.y + ball.radius > player1.y &&
       ball.y - ball.radius < player1.y + player1.height) paddle = player1;
    else if(ball.x + ball.radius > player2.x &&
            ball.y + ball.radius > player2.y &&
            ball.y - ball.radius < player2.y + player2.height) paddle = player2;

    if(paddle) {
        let collidePoint = ball.y - (paddle.y + paddle.height/2);
        collidePoint /= (paddle.height/2);
        let angleRad = collidePoint * Math.PI/4;
        let direction = (ball.x < GAME_WIDTH/2) ? 1 : -1;
        ball.dx = direction*(ball.speed +1)*Math.cos(angleRad);
        ball.dy = (ball.speed +1)*Math.sin(angleRad);
        ball.speed += 0.25;
    }

    if(ball.x - ball.radius <0) { player2Score++; resetBall(); }
    else if(ball.x + ball.radius > GAME_WIDTH) { player1Score++; resetBall(); }

    if(player1Score >= WINNING_SCORE || player2Score >= WINNING_SCORE) endGame();
}

function resetBall() {
    ball.x = GAME_WIDTH/2;
    ball.y = GAME_HEIGHT/2;
    ball.speed = 5;
    ball.dx = (Math.random()>0.5?1:-1)*5;
    ball.dy = (Math.random()>0.5?1:-1)*5;
}

function endGame() {
    gameOver = true;
    const winner = player1Score >= WINNING_SCORE ? "شما" : "کامپیوتر";
    restartBtn.style.display = "block";
    scoreEl.textContent = `بازی تمام شد! ${winner} برنده شد!`;
}

// کنترل کیبورد
document.addEventListener('keydown', e=>{
    if(e.key==='ArrowUp') player1.dy = -player1.speed;
    if(e.key==='ArrowDown') player1.dy = player1.speed;
});
document.addEventListener('keyup', e=>{
    if(e.key==='ArrowUp'|| e.key==='ArrowDown') player1.dy=0;
});

// کنترل موبایل: لمس نیم بالا یا پایین صفحه
canvas.addEventListener('touchstart', e=>{
    const touchY = e.touches[0].clientY - canvas.getBoundingClientRect().top;
    player1.dy = touchY < GAME_HEIGHT/2 ? -player1.speed : player1.speed;
    e.preventDefault();
});
canvas.addEventListener('touchmove', e=>{
    const touchY = e.touches[0].clientY - canvas.getBoundingClientRect().top;
    player1.dy = touchY < GAME_HEIGHT/2 ? -player1.speed : player1.speed;
    e.preventDefault();
});
canvas.addEventListener('touchend', e=>{
    player1.dy = 0;
});

// ریست بازی
function restartGame() {
    player1Score=0;
    player2Score=0;
    gameOver=false;
    restartBtn.style.display = "none";
    resetBall();
}

// بروزرسانی امتیاز
function updateScore() {
    if(!gameOver)
        scoreEl.textContent = `شما ${player1Score} - ${player2Score} کامپیوتر`;
}

// حلقه بازی
function gameLoop() {
    ctx.clearRect(0,0,GAME_WIDTH,GAME_HEIGHT);
    if(!gameOver){
        updatePlayer1();
        updatePlayer2();
        updateBall();
    }

    drawPaddle(player1);
    drawPaddle(player2);
    drawBall();

    // خط وسط
    ctx.beginPath();
    ctx.setLineDash([10,10]);
    ctx.moveTo(GAME_WIDTH/2,0);
    ctx.lineTo(GAME_WIDTH/2,GAME_HEIGHT);
    ctx.strokeStyle='#fff';
    ctx.stroke();
    ctx.setLineDash([]);

    updateScore();
    requestAnimationFrame(gameLoop);
}

window.addEventListener('resize', ()=>{
    GAME_WIDTH = window.innerWidth*0.95;
    GAME_HEIGHT = window.innerHeight*0.7;
    canvas.width = GAME_WIDTH;
    canvas.height = GAME_HEIGHT;
    player1.y = GAME_HEIGHT/2 - PADDLE_HEIGHT/2;
    player2.y = GAME_HEIGHT/2 - PADDLE_HEIGHT/2;
    resetBall();
});

gameLoop();
</script>
</body>
</html>
